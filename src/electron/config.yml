productName: "My Wallet"
# Pinned by config.test.ts: change ONLY together with ARTIFACT_NAME_BASE in
# package-and-publish.yml (workflow artifact names must match electron-builder output) and the
# get.mywallet.io download page. Renaming is safe for installed clients: the update feed
# (latest*.yml) and the files it points at are generated together into the same release, so old
# clients download whatever name the new feed declares.
artifactName: "MyWallet-${arch}.${ext}"
appId: "io.mytonwallet.electron"
extraMetadata:
  main: "./dist/electron.js"
  # DO NOT RENAME. This is the sole source of `app.getName()`, which keys `app.getPath('userData')`
  # (the IndexedDB holding every wallet) and the macOS keychain entry `<name> Safe Storage`. Turning
  # on Touch ID re-encrypts the wallet under a random password whose only copy is sealed by that
  # keychain entry, so losing the entry leaves the mnemonic undecryptable and the seed phrase the
  # only way back. No migration exists, and any other value - including deleting the key, which
  # falls back to package.json `name` ("mytonwallet") - strands existing desktop wallets.
  # `CFBundleName` has no say in either path. The user-visible name is `productName` above, which
  # never reaches the packaged package.json and is safe to change. Enforced by `config.test.ts`.
  productName: "MyTonWallet"
files:
  - "dist"
  - "package.json"
  - "public/icon-256x256.png"
  - "public/icon-32x32.png"
  - "public/icon-electron-windows.ico"
  - "public/icon-electron-macos.icns"
  - "!dist/get"
  - "!dist/**/statoscope-build-statistics.json"
  - "!dist/**/statoscope-report.html"
  - "!dist/**/statoscope-reference.json"
  - "!node_modules"
directories:
  buildResources: "./public"
  output: "./dist-electron"
protocols:
  - name: "Ton"
    schemes: ["ton"]
  - name: "TonConnect"
    schemes: ["tc"]
  - name: "TonConnect My Wallet"
    schemes: ["mytonwallet-tc"]
  - name: "My Wallet"
    schemes: ["mtw"]
  - name: "WalletConnect"
    schemes: ["wc"]
  - name: "WalletConnect My Wallet"
    schemes: ["mywallet-wc"]
publish:
  provider: "github"
  owner: "mytonwallet-org"
  repo: "mytonwallet"
  releaseType: "draft"
win:
  target:
    - target: "nsis"
      arch:
        - x64
  icon: "public/icon-electron-windows.ico"
nsis:
  oneClick: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
mac:
  target:
    target: "default"
    arch: ["x64", "arm64"]
  entitlements: "public/electron-entitlements.mac.plist"
  icon: "public/icon-electron-macos.icns"

dmg:
  title: "My Wallet installer"
  background: "public/background-electron-dmg.tiff"
  contents:
    - x: 148
      y: 180
      type: "file"
    - x: 392
      y: 180
      type: "link"
      path: "/Applications"
linux:
  category: "Cryptocurrencies"
  target:
    - target: "AppImage"
      arch:
        - x64
        - arm64
  icon: "public/icon-256x256.png"
